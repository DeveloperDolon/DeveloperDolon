name: Generate Snake Animation

on:
  # Runs automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Also runs on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1 — Checkout the repo
      - uses: actions/checkout@v3

      # Step 2 — Generate the snake SVGs
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00D9FF&color_dots=#0d1117,#003d4d,#006680,#009ab3,#00D9FF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3 — Show build status for debugging
      - name: Show build status
        run: git status

      # Step 4 — Push the generated files to the "output" branch
      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake animations"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}